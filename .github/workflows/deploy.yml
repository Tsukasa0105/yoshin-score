name: Build & Deploy to FTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install & Build React app ─────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      # ── 4. Setup PHP & Composer ──────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock', 'api/composer.json') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── 5. Assemble deployment directory ─────────────────────────
      - name: Assemble deploy directory
        run: |
          mkdir -p deploy
          # Copy React build output
          cp -r dist/. deploy/
          # Copy root .htaccess
          cp .htaccess deploy/.htaccess
          # Copy PHP API
          cp -r api deploy/api
          # Ensure data directory exists on server so PHP can write history.json
          mkdir -p deploy/api/data
          echo "=== Deploy directory contents ==="
          find deploy -maxdepth 3 -type f | head -40

      # Generate .env with API key from GitHub Secret (never committed to git)
      - name: Inject Anthropic API key
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > deploy/api/.env
          echo ".env created (key length: ${#ANTHROPIC_API_KEY})"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── 6. Deploy to FTP (via lftp) ──────────────────────────────
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to FTP server
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_HOST;
            mirror --reverse --delete --parallel=5 --verbose=1 --exclude-glob 'history.json' ./deploy/ $FTP_DIR;
            quit
          "
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR:  ${{ secrets.FTP_SERVER_DIR }}

      - name: Deployment complete
        run: echo "✅ Deployment to ${{ secrets.FTP_HOST }} completed successfully"
